x-app-environment: &app-environment
  POSTGRES_HOST: localhost
  POSTGRES_PORT: "5432"
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0

x-app-service: &app-service
  image: suetolog-app:dev
  env_file:
    - .env
  environment: *app-environment
  profiles: ["app"]
  init: true
  network_mode: host

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suetolog_db}
      POSTGRES_USER: ${POSTGRES_USER:-suetolog_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suetolog_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suetolog_user} -d ${POSTGRES_DB:-suetolog_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    <<: *app-service
    build:
      context: .
    environment:
      <<: *app-environment
      WAIT_FOR_REDIS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "manage.py", "migrate", "--noinput"]
    restart: "no"

  bot:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command: ["python", "manage.py", "runbot"]
    restart: unless-stopped

  worker:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command:
      ["celery", "-A", "config", "worker", "--loglevel=info", "--pool=solo"]
    restart: unless-stopped

  beat:
    <<: *app-service
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "config",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
